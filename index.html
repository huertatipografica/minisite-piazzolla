<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Meta basic -->
    <title>Piazzolla — Free variable serif by HT Fonts</title>
    <meta name="description"
          content="Piazzolla by HT Fonts — a free variable serif typeface for press and publications. Compact, highly legible, 2300+ glyphs and 210+ languages. Download it free." />
    <meta name="robots"
          content="index, follow">
    <meta name="author"
          content="Juan Pablo del Peral">
    <link rel="canonical"
          href="https://piazzolla.htfonts.com/">

    <!-- Open Graph -->
    <meta property="og:title"
          content="Piazzolla — Free variable serif by HT Fonts" />
    <meta property="og:site_name"
          content="HT Fonts" />
    <meta property="og:description"
          content="A free variable serif typeface for press and publications. Compact, highly legible, with 2300+ glyphs and support for 210+ languages." />
    <meta property="og:type"
          content="website" />
    <meta property="og:url"
          content="https://piazzolla.htfonts.com/" />
    <meta property="og:image"
          content="https://piazzolla.htfonts.com/preview.png" />
    <meta property="og:image:type"
          content="image/png" />
    <meta property="og:image:width"
          content="2200" />
    <meta property="og:image:height"
          content="1284" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CreativeWork",
      "name": "Piazzolla",
      "description": "A free variable serif typeface for press and publications, designed by Juan Pablo del Peral for HT Fonts.",
      "creator": { "@type": "Organization", "name": "HT Fonts", "url": "https://www.htfonts.com/" },
      "author": { "@type": "Person", "name": "Juan Pablo del Peral" },
      "url": "https://piazzolla.htfonts.com/",
      "image": "https://piazzolla.htfonts.com/preview.png",
      "genre": "Typeface",
      "isAccessibleForFree": true
    }
    </script>

    <link rel="stylesheet"
          href="dist/app.css">

    <link rel="icon" href="https://htfonts.com/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="https://htfonts.com/favicon-32x32.png">
    <link rel="apple-touch-icon" href="https://htfonts.com/apple-touch-icon.png">
</head>

<body>
    <div id="app"
         class="relative">

        <inspector></inspector>
        <splash></splash>
        <matrix></matrix>
        <toolbar></toolbar>
        <quote></quote>
        <player></player>
        <timeline></timeline>
        <highlights></highlights>
        <opsz></opsz>
        <multiscript></multiscript>
        <marq></marq>
        <foot></foot>
    </div>
    <script src="dist/app.js"></script>
</body>

</html>
