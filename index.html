<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Meta basic -->
    <title>Piazzolla — Free variable serif by HT Fonts</title>
    <meta name="description"
          content="Piazzolla by HT Fonts — a free variable serif typeface for press and publications. Compact, highly legible, 2300+ glyphs and 210+ languages. Download it free." />
    <meta name="robots"
          content="index, follow">
    <meta name="author"
          content="Juan Pablo del Peral">
    <link rel="canonical"
          href="https://piazzolla.htfonts.com/">

    <!-- Open Graph -->
    <meta property="og:title"
          content="Piazzolla — Free variable serif by HT Fonts" />
    <meta property="og:site_name"
          content="HT Fonts" />
    <meta property="og:description"
          content="A free variable serif typeface for press and publications. Compact, highly legible, with 2300+ glyphs and support for 210+ languages." />
    <meta property="og:type"
          content="website" />
    <meta property="og:url"
          content="https://piazzolla.htfonts.com/" />
    <meta property="og:image"
          content="https://piazzolla.htfonts.com/preview.png" />
    <meta property="og:image:type"
          content="image/png" />
    <meta property="og:image:width"
          content="2200" />
    <meta property="og:image:height"
          content="1284" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Piazzolla",
      "description": "A free variable serif typeface for press and publications, designed by Juan Pablo del Peral for HT Fonts.",
      "brand": { "@type": "Brand", "name": "HT Fonts" },
      "url": "https://piazzolla.htfonts.com/",
      "image": "https://piazzolla.htfonts.com/preview.png",
      "category": "Typeface",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock",
        "url": "https://piazzolla.htfonts.com/"
      }
    }
    </script>

    <link rel="stylesheet"
          href="dist/app.css">

    <!-- Icons -->
    <link rel="apple-touch-icon"
          sizes="180x180"
          href="/apple-touch-icon.png">
    <link rel="icon"
          type="image/png"
          sizes="32x32"
          href="/favicon-32x32.png">
    <link rel="icon"
          type="image/png"
          sizes="16x16"
          href="/favicon-16x16.png">
    <link rel="manifest"
          href="/site.webmanifest">
    <link rel="mask-icon"
          href="/safari-pinned-tab.svg"
          color="#01e0a7">
    <meta name="msapplication-TileColor"
          content="#01e0a7">
    <meta name="theme-color"
          content="#ffffff">
</head>

<body>
    <div id="app"
         class="relative">

        <inspector></inspector>
        <splash></splash>
        <matrix></matrix>
        <toolbar></toolbar>
        <quote></quote>
        <player></player>
        <timeline></timeline>
        <highlights></highlights>
        <opsz></opsz>
        <multiscript></multiscript>
        <marq></marq>
        <foot></foot>
    </div>
    <script src="dist/app.js"></script>
</body>

</html>
